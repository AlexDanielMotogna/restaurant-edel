<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Edel - Aperitif & Limonade</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Urbanist:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        @page {
            size: A4 portrait;
            margin: 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Urbanist', sans-serif;
            color: #2c2c2c;
            background: transparent;
            line-height: 1.4;
        }

        .menu-page {
            width: 210mm;
            height: 297mm;
            background: transparent;
            position: relative;
            padding: 0mm 12mm 10mm 12mm;
            display: flex;
            flex-direction: column;
            page-break-after: always;
            break-after: page;
            overflow: hidden;
        }

        .menu-page:last-child {
            page-break-after: auto;
            break-after: auto;
        }

        /* Header */
        .menu-header {
            text-align: center;
            margin-bottom: 2px;
        }

        .menu-logo {
            width: 270px;
            height: auto;
            margin: -10px auto -20px;
            display: block;
        }

        .menu-main-title {
            font-family: 'Fraunces', serif;
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #2c2c2c;
            line-height: 1.2;
            margin-top: -10px;
        }

        /* Layout */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .content-area .column {
            width: 100%;
            max-width: 110mm;
        }

        .column {
            display: flex;
            flex-direction: column;
        }

        /* Section titles */
        .section-title {
            font-family: 'Fraunces', serif;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #2c2c2c;
            text-align: center;
            margin: 18px 0 8px 0;
            padding: 5px 0;
            border-bottom: none;
        }

        .section-title::after {
            content: "";
            display: block;
            width: 35%;
            margin: 4px auto 0;
            border-bottom: 0.3px solid rgba(139, 105, 20, 0.25);
        }

        .section-title:first-child {
            margin-top: 0;
        }

        /* Menu items */
        .menu-item {
            margin-bottom: 6px;
            text-align: center;
        }

        .item-name {
            font-family: 'Fraunces', serif;
            font-size: 12px;
            font-weight: 600;
            color: #2c2c2c;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .item-details {
            font-family: 'Urbanist', sans-serif;
            font-size: 13px;
            font-style: italic;
            color: #2c2c2c;
            line-height: 1.4;
            margin: 3px 0 2px 0;
            text-align: center;
        }

        .item-price {
            font-family: 'Urbanist', sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: #8B6914;
            letter-spacing: 0.3px;
            text-align: center;
        }

        /* Decorative dot separator between items */
        .menu-item-decorated {
            margin-bottom: 6px;
            padding-bottom: 3px;
            position: relative;
        }
        .menu-item-decorated::after {
            content: "· · ·";
            display: block;
            text-align: center;
            color: rgba(139, 105, 20, 0.35);
            font-size: 10px;
            letter-spacing: 4px;
            margin-top: 6px;
        }

        @media print {
            html, body {
                margin: 0 !important;
                padding: 0 !important;
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
            }
            .menu-page {
                margin: 0;
                width: 210mm;
                height: 297mm;
                page-break-after: always;
                break-after: page;
            }
            .menu-page:last-child {
                page-break-after: auto;
                break-after: auto;
            }
        }
    </style>
</head>
<body>

<!-- ============= PÁGINA: APERITIF & LIMONADE ============= -->
<div class="menu-page">

    <div class="content-area">

        <!-- COLUMNA ÚNICA: Aperitif + Limonade -->
        <div class="column">

            <div class="section-title">Aperitif</div>

            <div class="menu-item menu-item-decorated">
                <div class="item-name">Limoncello</div>
                <div class="item-price">€6,70</div>
            </div>

            <div class="menu-item menu-item-decorated">
                <div class="item-name">Lillet</div>
                <div class="item-price">€5,90</div>
            </div>

            <div class="menu-item menu-item-decorated">
                <div class="item-name">Averna Sour</div>
                <div class="item-price">€5,90</div>
            </div>

            <div class="menu-item">
                <div class="item-name">Monin Spritzer</div>
                <div class="item-details">Weiß Spritzer mit verschiedenen Geschmacksrichtungen</div>
                <div class="item-price">€4,70</div>
            </div>

            <div class="section-title">Limonade</div>

            <div class="menu-item menu-item-decorated">
                <div class="item-name">Erdbeeren &amp; Basilikum</div>
                <div class="item-price">€4,90</div>
            </div>

            <div class="menu-item">
                <div class="item-name">Himbeeren &amp; Minze</div>
                <div class="item-price">€4,90</div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
