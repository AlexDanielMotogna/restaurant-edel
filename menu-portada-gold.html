<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Edel - Speisekarte</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;600;700&family=Urbanist:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        @page {
            size: A4 portrait;
            margin: 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Urbanist', sans-serif;
            color: #18312e;
            background: #ffffff;
            line-height: 1.6;
        }

        .cover-page {
            width: 210mm;
            height: 297mm;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            text-align: center;
            padding: 40px;
            position: relative;
            border: 1px solid #e8e0d5;
        }

        .cover-logo {
            width: 400px;
            height: auto;
            margin-bottom: 50px;
        }

        .cover-title {
            font-family: 'Fraunces', serif;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 15px;
            color: #5a4510;
            text-transform: uppercase;
        }

        .cover-divider {
            width: 200px;
            height: 2px;
            background: #5a4510;
            margin: 30px auto;
        }

        .cover-subtitle {
            font-size: 20px;
            letter-spacing: 3px;
            color: #5a4510;
            font-weight: 400;
        }

        .cover-info {
            margin-top: 60px;
            font-size: 16px;
            color: #18312e;
            line-height: 2;
        }

        .corner-decoration {
            position: absolute;
            width: 80px;
            height: 80px;
            z-index: 10;
        }

        .corner-left-top { top: 0; left: 0; }
        .corner-left-bottom { bottom: 0; left: 0; }
        .corner-right-top { top: 0; right: 0; }
        .corner-right-bottom { bottom: 0; right: 0; }

        @media print {
            body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
            .cover-page { border: none; }
        }
    </style>
</head>
<body>

    <img src="images/resource/menucard-corner-left-top.png" class="corner-decoration corner-left-top" alt="" onerror="this.style.display='none'">
    <img src="images/resource/menucard-corner-left-bottom.png" class="corner-decoration corner-left-bottom" alt="" onerror="this.style.display='none'">
    <img src="images/resource/menucard-corner-right-top.png" class="corner-decoration corner-right-top" alt="" onerror="this.style.display='none'">
    <img src="images/resource/menucard-corner-right-bottom.png" class="corner-decoration corner-right-bottom" alt="" onerror="this.style.display='none'">

    <div class="cover-page">
        <img src="images/logo.png" alt="Restaurant Edel" class="cover-logo">

        <div class="cover-divider"></div>
        <h1 class="cover-title">Speisekarte</h1>
        <p class="cover-subtitle">Restaurant Edel</p>
        <div class="cover-divider"></div>

        <div class="cover-info">
            Bundesstraße 41<br>
            8077 Gössendorf, Österreich<br>
            +43 676 5809878<br>
            office@restaurant-edel.at
        </div>
    </div>

</body>
</html>
